name: CI

# Build + test on every push to main and every pull request, plus an
# (advisory) formatting check. The build-and-test job is the gate that
# protects the branch; the format job is informational for now (see its
# comment for how to make it blocking).
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same ref, so a
# rapid push sequence doesn't queue redundant macOS runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: macos-latest
    steps:
      # Pinned to a major tag for readability; pin to a full commit SHA if you
      # want supply-chain-hardened, immutable action references.
      - uses: actions/checkout@v4

      # JellySleeve uses Swift 6 strict concurrency and the latest SDK, so
      # build with the newest stable Xcode the runner offers rather than its
      # (possibly older) default selection.
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      # `test` builds the app + test bundle and runs the suite. Debug config
      # matches local development and keeps strict-concurrency checks on.
      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -project JellySleeve.xcodeproj \
            -scheme JellySleeve \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            test

      # A Release build catches issues hidden behind `#if DEBUG` or release-only
      # optimizer behavior that the Debug test run wouldn't surface.
      - name: Release build
        run: |
          set -o pipefail
          xcodebuild \
            -project JellySleeve.xcodeproj \
            -scheme JellySleeve \
            -configuration Release \
            -destination 'platform=macOS' \
            build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  format:
    name: Format check (advisory)
    runs-on: macos-latest
    # Advisory for now: the repo has never been run through `swift-format`, so a
    # strict gate would fail on ~370 pre-existing, auto-fixable violations
    # (indentation, blank lines, spacing, semicolons) plus ~50 over-length code
    # lines — i.e. on existing style, not on the change under review. To make it
    # blocking: run `swift-format format -i -r JellySleeve JellySleeveTests`,
    # hand-wrap the remaining long code lines, then delete this line.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # Apple's official formatter ships inside the Xcode toolchain, so no
      # external dependency is installed — it's invoked via `xcrun`. The config
      # is the repo-root `.swift-format` (passed explicitly for clarity).
      - name: swift-format lint
        run: |
          xcrun swift-format lint --strict --recursive \
            --configuration .swift-format \
            JellySleeve JellySleeveTests
